name: Release
run-name: Tag release and generate API docs

# Triggered when stage merges to master. Uses the version from .csproj on the
# commit shared by master and stage, then tags that same commit. Release
# artifacts are created by the stage build and are not recreated here.
permissions:
  contents: read

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      target-sha: ${{ steps.target.outputs.sha }}
      version: ${{ steps.get-version.outputs.version }}
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
      with:
        egress-policy: audit

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        ref: master

    - name: Resolve release target
      id: target
      shell: bash
      run: |
        set -euo pipefail
        git fetch --no-tags origin stage:refs/remotes/origin/stage
        target=$(git merge-base HEAD origin/stage)
        echo "Release target SHA: $target"
        echo "sha=$target" >> "$GITHUB_OUTPUT"

    - name: Get version from release target
      id: get-version
      shell: pwsh
      run: |
        $projectXml = (git show "${{ steps.target.outputs.sha }}:AerospikeClient/AerospikeClient.csproj") -join "`n"
        $versionMatch = [regex]::Match($projectXml, '<Version>\s*([^<]+?)\s*</Version>')
        $version = $versionMatch.Groups[1].Value
        if (-not $version) {
          Write-Error "Could not read <Version> from AerospikeClient/AerospikeClient.csproj at ${{ steps.target.outputs.sha }}"
          exit 1
        }
        Write-Host "Release version: $version"
        "version=$version" >> $env:GITHUB_OUTPUT

  generate-api-docs:
    needs: resolve-release
    runs-on: ubuntu-latest
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
      with:
        egress-policy: audit

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ needs.resolve-release.outputs.target-sha }}
    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        dotnet-version: 8.0.x
    - name: Install DocFX
      run: dotnet tool install -g docfx
    - name: Build project (for XML docs)
      run: dotnet build AerospikeClient/AerospikeClient.csproj --configuration Release
    - name: Set doc footer with version and commit
      run: |
        VERSION=$(echo "${{ needs.resolve-release.outputs.version }}" | sed 's/-[0-9]*$//')
        FOOTER="Aerospike C# Client v${VERSION} &#8226; ${{ needs.resolve-release.outputs.target-sha }} &#8226; Copyright 2012-2026 Aerospike, Inc."
        jq --arg footer "$FOOTER" '.build.globalMetadata._appFooter = $footer' docfx.json > docfx.tmp && mv docfx.tmp docfx.json
    - name: Generate API documentation
      run: docfx docfx.json
    - name: Upload API docs artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: api-docs-${{ needs.resolve-release.outputs.version }}
        path: _site
        retention-days: 90

  # Tag the commit that's shared between
  # master and stage so the tag is reachable from both branches. We use
  # `git merge-base origin/master origin/stage` rather than tagging master's
  # tip directly: if stage→master was a merge commit, the merge commit itself
  # is only on master, but the merge-base (stage's tip at merge time) is on
  # both. If the merge was a fast-forward, merge-base == HEAD, which still
  # works.
  tag:
    needs: [resolve-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
      with:
        egress-policy: audit

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        ref: master

    - name: Create and push release tag
      env:
        VERSION: ${{ needs.resolve-release.outputs.version }}
        TARGET_SHA: ${{ needs.resolve-release.outputs.target-sha }}
      run: |
        set -euo pipefail
        tag="v${VERSION}"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
          echo "::error::Tag ${tag} already exists. Did you forget to bump the version?"
          exit 1
        fi
        git tag -a "${tag}" -m "Release ${tag}" "${TARGET_SHA}"
        git push origin "${tag}"
        echo "Tagged ${TARGET_SHA} as ${tag}"

    - name: Summary
      env:
        VERSION: ${{ needs.resolve-release.outputs.version }}
        TARGET_SHA: ${{ needs.resolve-release.outputs.target-sha }}
      run: |
        {
          echo "## Release Tag";
          echo "";
          echo "- **Tag:** \`v${VERSION}\`";
          echo "- **Commit:** \`${TARGET_SHA}\`";
          echo "- **Reachable from:** \`master\`, \`stage\`";
        } >> "$GITHUB_STEP_SUMMARY"
