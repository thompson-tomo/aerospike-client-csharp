name: Release
run-name: Build release artifacts and generate API docs

# Triggered when stage merges to master. Builds and publishes artifacts using
# the version from .csproj (set by the bump-version workflow), then tags the
# corresponding commit. The tag is created on the commit shared by master
# and stage so it's reachable from both branches.
permissions:
  id-token: write
  contents: read

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      dry-run:
        type: boolean
        required: false
        default: false
        description: "Dry run: only build and generate API docs (skip sign, deploy, release, and tag)"

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
      with:
        egress-policy: audit

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        dotnet-version: 8.0.x

    - name: Build artifacts
      uses: ./.github/actions/build
      with:
        sgKey: ${{ secrets.SG_KEY }}

    - name: Get version from nupkg
      id: get-version
      shell: pwsh
      run: |
        $nupkg = Get-ChildItem -Path AerospikeClient\bin\Release -Filter "Aerospike.Client.*.nupkg" | Where-Object { $_.Extension -eq ".nupkg" } | Select-Object -First 1
        $version = $nupkg.BaseName -replace '^Aerospike\.Client\.', ''
        echo "version=$version" >> $env:GITHUB_OUTPUT

  sign:
    if: ${{ !inputs.dry-run }}
    needs: build
    uses: aerospike/shared-workflows/.github/workflows/reusable_sign-artifacts.yaml@8ec712eafbec26c8db8d1183688a5fd806560a95 # v3.5.0
    with:
      gh-unsigned-artifacts: AerospikeClient-${{ github.run_id }}
      gh-workflows-ref: v3.5.0
    secrets:
      gpg-private-key: ${{ secrets.GPG_SECRET_KEY }}
      gpg-public-key: ${{ secrets.GPG_PUBLIC_KEY }}
      gpg-key-pass: ${{ secrets.GPG_PASS }}
      es-username: ${{ secrets.ES_USERNAME }}
      es-password: ${{ secrets.ES_PASSWORD }}
      credential_id: ${{ secrets.CREDENTIAL_ID }}
      es-totp_secret: ${{ secrets.ES_TOTP_SECRET }}

  generate-api-docs:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
      with:
        egress-policy: audit

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        dotnet-version: 8.0.x
    - name: Install DocFX
      run: dotnet tool install -g docfx
    - name: Build project (for XML docs)
      run: dotnet build AerospikeClient/AerospikeClient.csproj --configuration Release
    - name: Set doc footer with version and commit
      run: |
        VERSION=$(echo "${{ needs.build.outputs.version }}" | sed 's/-[0-9]*$//')
        FOOTER="Aerospike C# Client v${VERSION} &#8226; ${{ github.sha }} &#8226; Copyright 2012-2026 Aerospike, Inc."
        jq --arg footer "$FOOTER" '.build.globalMetadata._appFooter = $footer' docfx.json > docfx.tmp && mv docfx.tmp docfx.json
    - name: Generate API documentation
      run: docfx docfx.json
    - name: Upload API docs artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: api-docs-${{ needs.build.outputs.version }}
        path: _site
        retention-days: 90

  deploy:
    if: ${{ !inputs.dry-run }}
    needs: [build, sign]
    uses: aerospike/shared-workflows/.github/workflows/reusable_deploy-artifacts.yaml@8ec712eafbec26c8db8d1183688a5fd806560a95 # v3.5.0
    with:
      jf-project: database
      jf-build-name: aerospike-client-csharp
      jf-build-id: ${{ github.run_id }}-${{ github.run_attempt }}
      jf-metadata-build-id: ${{ github.run_id }}-${{ github.run_attempt }}-metadata
      version: ${{ needs.build.outputs.version }}
      gh-artifact-name: signed-artifacts
      gh-workflows-ref: v3.5.0
      oidc-provider-name: gh-aerospike
      oidc-audience: aerospike

  create-release-bundle:
    if: ${{ !inputs.dry-run }}
    needs: [build, deploy]
    uses: aerospike/shared-workflows/.github/workflows/reusable_create-release-bundle.yaml@8ec712eafbec26c8db8d1183688a5fd806560a95 # v3.5.0
    with:
      jf-project: database
      jf-build-names: "aerospike-client-csharp:${{ github.run_id }}-${{ github.run_attempt }}"
      jf-bundle-name: aerospike-client-csharp
      version: ${{ needs.build.outputs.version }}
      gh-workflows-ref: v3.5.0
      oidc-provider-name: gh-aerospike
      oidc-audience: aerospike

  # After the release bundle is created, tag the commit that's shared between
  # master and stage so the tag is reachable from both branches. We use
  # `git merge-base origin/master origin/stage` rather than tagging master's
  # tip directly: if stage→master was a merge commit, the merge commit itself
  # is only on master, but the merge-base (stage's tip at merge time) is on
  # both. If the merge was a fast-forward, merge-base == HEAD, which still
  # works.
  tag:
    if: ${{ !inputs.dry-run }}
    needs: [build, create-release-bundle]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
      with:
        egress-policy: audit

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        ref: master

    - name: Resolve tag target (commit shared by master and stage)
      id: target
      shell: bash
      run: |
        set -euo pipefail
        git fetch --no-tags --depth=0 origin stage
        target=$(git merge-base HEAD origin/stage)
        echo "Tag target SHA: $target"
        echo "sha=$target" >> "$GITHUB_OUTPUT"

    - name: Create and push release tag
      env:
        VERSION: ${{ needs.build.outputs.version }}
        TARGET_SHA: ${{ steps.target.outputs.sha }}
      run: |
        set -euo pipefail
        tag="v${VERSION}"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
          echo "::error::Tag ${tag} already exists. Did you forget to bump the version?"
          exit 1
        fi
        git tag -a "${tag}" -m "Release ${tag}" "${TARGET_SHA}"
        git push origin "${tag}"
        echo "Tagged ${TARGET_SHA} as ${tag}"

    - name: Summary
      env:
        VERSION: ${{ needs.build.outputs.version }}
        TARGET_SHA: ${{ steps.target.outputs.sha }}
      run: |
        {
          echo "## Release Tag";
          echo "";
          echo "- **Tag:** \`v${VERSION}\`";
          echo "- **Commit:** \`${TARGET_SHA}\`";
          echo "- **Reachable from:** \`master\`, \`stage\`";
        } >> "$GITHUB_STEP_SUMMARY"
