name: Build nuget package and test dll
description: Builds signed nuget package

inputs:
  sgKey:
    required: true

runs:
  using: composite
  steps:
    - name: Restore dependencies
      shell: pwsh
      run: dotnet restore

    - name: Build
      shell: pwsh
      run: dotnet build --configuration Release --no-restore

    - name: Create Code Signing Key
      shell: pwsh
      run: |
        New-Item -ItemType directory -Path key
        Set-Content -Path key\key.txt -Value '${{ inputs.sgKey }}'
        certutil -decode key\key.txt key\key.snk

    - name: Delay Sign dll
      shell: pwsh
      run: |
        & 'C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8.1 Tools\sn.exe' -R .\AerospikeClient\bin\Release\net8.0\AerospikeClient.dll key\key.snk

    - name: Create nuget packages
      shell: pwsh
      run: dotnet pack --no-build

    - name: Publish test project
      shell: pwsh
      working-directory: AerospikeTest
      # Framework-dependent deployment for linux-x64 - test runner uses 'dotnet exec' with .NET installed
      # Note: Cannot use --no-restore --no-build because the initial restore/build didn't include linux-x64 RID
      run: dotnet publish AerospikeTest.csproj -r linux-x64 --self-contained false
        
    - name: Zip it up
      shell: pwsh
      working-directory: AerospikeTest\bin\Release\net8.0\linux-x64
      run: 7z a -tzip AerospikeTest.zip publish

    - name: Upload client artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: AerospikeClient-${{ github.run_id }}
        path: AerospikeClient\bin\Release\Aerospike.Client.*nupkg
        retention-days: 1

    - name: Upload test artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: AerospikeTest-${{ github.run_id }}
        path: AerospikeTest\bin\Release\net8.0\linux-x64\AerospikeTest.zip
        retention-days: 1

    - name: Publish example project
      shell: pwsh
      working-directory: AerospikeExample
      run: dotnet publish AerospikeExample.csproj -r linux-x64 --self-contained false

    - name: Zip example project
      shell: pwsh
      working-directory: AerospikeExample\bin\Release\net8.0\linux-x64
      run: 7z a -tzip AerospikeExample-${{ github.run_number }}.zip publish

    - name: Upload example artifacts
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
      with:
        name: AerospikeExample-${{ github.run_number }}
        path: AerospikeExample\bin\Release\net8.0\linux-x64\AerospikeExample-*
        retention-days: 1
